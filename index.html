<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Photo Reader</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Word Photo Reader</h1>
            <p>Upload an image or use your camera to snap a word.</p>

            <!-- Image Preview Area -->
            <div id="imagePreview">
                <p>Your image will appear here</p>
            </div>
            
            <!-- Video Stream for Camera -->
            <video id="videoFeed" playsinline style="display:none;"></video>
            <canvas id="canvas" style="display:none;"></canvas>

            <!-- Action Buttons -->
            <div class="actions">
                <button id="uploadBtn" class="btn-primary">
                    <i class="fas fa-upload"></i> Upload Image
                </button>
                <button id="cameraBtn" class="btn-secondary">
                    <i class="fas fa-camera"></i> Use Camera
                </button>
                <button id="captureBtn" class="btn-capture" style="display:none;">
                    <i class="fas fa-camera-retro"></i> Take Photo
                </button>
            </div>

            <!-- Process Button -->
            <button id="processBtn" class="btn-process disabled" disabled>
                <i class="fas fa-cogs"></i> Process Image
            </button>

            <!-- Status Area -->
            <div id="status">
                <p>Select an image to start.</p>
            </div>
        </div>
    </div>
    <!-- CRITICAL FIX: Load Tesseract.js BEFORE main.js and REMOVE defer -->
    <script src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js'></script>
    <script src="main.js"></script>
</body>
</html>
